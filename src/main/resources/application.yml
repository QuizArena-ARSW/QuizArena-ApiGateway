# ==========================================================
# QuizArena - API Gateway
# Configuracion externalizada: ${VARIABLE:valor_por_defecto}
# ==========================================================
server:
  port: ${PORT:8080}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            # En Azure: la URL real del frontend (ej. https://quizarena.azurestaticapps.net)
            allowedOriginPatterns: ${CORS_ORIGENES:*}
            allowedMethods: "*"
            allowedHeaders: "*"
      routes:
        # --- Servicio de Identidad ---
        - id: identidad-auth
          uri: ${SERVICIO_IDENTIDAD_URL:http://localhost:8082}
          predicates:
            - Path=/api/auth/**
        - id: identidad-bancos
          uri: ${SERVICIO_IDENTIDAD_URL:http://localhost:8082}
          predicates:
            - Path=/api/bancos/**
        - id: identidad-historial
          uri: ${SERVICIO_IDENTIDAD_URL:http://localhost:8082}
          predicates:
            - Path=/api/historial/**
        - id: identidad-amigos
          uri: ${SERVICIO_IDENTIDAD_URL:http://localhost:8082}
          predicates:
            - Path=/api/amigos/**

        # --- Servicio de Juego ---
        - id: juego-salas
          uri: ${SERVICIO_JUEGO_URL:http://localhost:8081}
          predicates:
            - Path=/api/salas/**
        - id: juego-websocket
          uri: ${SERVICIO_JUEGO_URL:http://localhost:8081}
          predicates:
            - Path=/ws-juego/**

        # --- Servicio de IA (bono) ---
        - id: ia-preguntas
          uri: ${SERVICIO_IA_URL:http://localhost:8083}
          predicates:
            - Path=/api/ia/**

# ---- JWT: la MISMA clave que el Servicio de Identidad ----
# Sin valor por defecto a proposito: si falta la variable de entorno, la app
# debe fallar al arrancar en vez de validar tokens con una clave publica.
quizarena:
  jwt:
    secret: ${JWT_SECRET}
  seguridad:
    rutas-publicas: /api/auth,/ws-juego,/api/bancos/oficiales

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.quizarena.gateway: INFO
